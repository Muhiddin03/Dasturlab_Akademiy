<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O'quvchi kabineti — Dasturlab Akademi</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(124,111,247,.3);border-radius:4px}
:root{
  --bg:#0f0e1a;--bg2:#1a1829;--bg3:#241f38;
  --card:#1e1c30;--border:#2e2a45;
  --text:#e8e6f0;--muted:#8b87a8;--hint:#5a5675;
  --purple:#7c6ff7;--purple2:#6355e8;
  --green:#22c55e;--red:#ef4444;--amber:#f59e0b;--blue:#3b82f6;
  --gold:#fcd34d;
  --radius:10px;--radius-lg:16px;
}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh}

/* NAV */
.navbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.nav-logo{font-weight:800;font-size:18px;color:var(--purple);margin-right:auto}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--radius);border:none;cursor:pointer;font-size:14px;font-weight:600;transition:.15s}
.btn-primary{background:var(--purple);color:#fff}.btn-primary:hover{background:var(--purple2)}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{border-color:var(--purple)}
.btn-sm{padding:6px 14px;font-size:13px}
.btn-xs{padding:4px 10px;font-size:12px}
.inp{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;color:var(--text);font-size:14px;outline:none;transition:.15s}
.inp:focus{border-color:var(--purple)}

/* LAYOUT */
.container{max-width:960px;margin:0 auto;padding:24px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.badge-green{background:rgba(34,197,94,.15);color:#86efac}
.badge-amber{background:rgba(245,158,11,.15);color:#fcd34d}
.badge-blue{background:rgba(59,130,246,.15);color:#93c5fd}
.badge-purple{background:rgba(124,111,247,.15);color:#c4b5fd}
.badge-red{background:rgba(239,68,68,.15);color:#fca5a5}

/* TABS */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab{padding:10px 20px;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.tab.active{color:var(--purple);border-bottom-color:var(--purple)}
.tab:hover:not(.active){color:var(--text)}

/* PROFILE HEADER */
.profile-header{background:linear-gradient(135deg,rgba(124,111,247,.15),rgba(99,85,232,.05));border:1px solid rgba(124,111,247,.2);border-radius:var(--radius-lg);padding:28px;display:flex;align-items:center;gap:20px;margin-bottom:24px}
.avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--purple2));display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:#fff;flex-shrink:0}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;text-align:center}
.stat-val{font-size:28px;font-weight:900}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:4px}

/* COIN */
.coin-svg{display:inline-block;vertical-align:middle;margin-right:3px}

/* TABLE */
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:10px 12px;text-align:left;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border);background:var(--bg3)}
td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.03)}
tr:hover td{background:rgba(124,111,247,.03)}

/* LOGIN PAGE */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:36px;width:100%;max-width:400px}

/* NOTIF */
#notifWrap{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px}
.notif{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;font-size:13px;display:flex;align-items:center;gap:8px;min-width:240px;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.notif.err{border-color:rgba(239,68,68,.4);background:rgba(127,29,29,.3)}

/* SPINNER */
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* RANKING */
.rank-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:10px;transition:.15s}
.rank-row:hover{background:rgba(124,111,247,.05)}
.rank-medal{font-size:20px;width:32px;text-align:center}

/* JOURNAL */
.att-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:4px}

@media(max-width:600px){
  .profile-header{flex-direction:column;text-align:center}
  .stat-grid{grid-template-columns:1fr 1fr}
  .tabs{overflow-x:auto}
  .tab{white-space:nowrap;padding:10px 14px;font-size:13px}
  .container{padding:16px}
}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-logo">🎓 Dasturlab Akademi</div>
  <div id="navRight" style="display:flex;gap:8px;align-items:center">
    <a href="index.html" class="btn btn-secondary btn-sm">← Bosh sahifa</a>
  </div>
</nav>

<!-- LOGIN PAGE -->
<div id="loginPage" class="login-wrap">
  <div class="login-box">
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:48px;margin-bottom:12px">🎓</div>
      <div style="font-size:22px;font-weight:800">O'quvchi kabineti</div>
      <div style="font-size:13px;color:var(--muted);margin-top:6px">Login va parol bilan kiring</div>
    </div>
    <div style="margin-bottom:14px">
      <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:5px;font-weight:600">Login (Telefon yoki email)</label>
      <input class="inp" id="loginInput" placeholder="+998901234567 yoki email" type="text" onkeydown="if(event.key==='Enter')doStudentLogin()">
    </div>
    <div style="margin-bottom:20px">
      <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:5px;font-weight:600">Parol</label>
      <input class="inp" id="passInput" placeholder="Parolni kiriting" type="password" onkeydown="if(event.key==='Enter')doStudentLogin()">
    </div>
    <div id="loginErr" style="color:#fca5a5;font-size:13px;margin-bottom:12px;display:none"></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="doStudentLogin()" id="loginBtn">
      Kirish →
    </button>
    <div style="text-align:center;margin-top:16px;font-size:12px;color:var(--muted)">
      Parol yo'qmi? O'qituvchingizdan so'rang
    </div>
  </div>
</div>

<!-- MAIN CABINET -->
<div id="cabinetPage" style="display:none">
  <div class="container">

    <!-- Profile header -->
    <div class="profile-header" id="profileHeader"></div>

    <!-- Stats -->
    <div class="stat-grid" id="statGrid"></div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" onclick="switchTab('results')">📝 Test natijalari</div>
      <div class="tab" onclick="switchTab('journal')">📋 Jurnal</div>
      <div class="tab" onclick="switchTab('coins')">Coinlar</div>
      <div class="tab" onclick="switchTab('ranking')">🏆 Reyting</div>
    </div>

    <!-- Tab panels -->
    <div id="tab-results"></div>
    <div id="tab-journal" style="display:none"></div>
    <div id="tab-coins" style="display:none"></div>
    <div id="tab-ranking" style="display:none"></div>

  </div>
</div>

<div id="notifWrap"></div>

<script src="/api/env.js" onerror=""></script>
<script>
const { createClient } = supabase;
let sb = null;
let currentStudent = null;

// ============================================================
// INIT
// ============================================================
async function initSupabase() {
  if (window.SUPABASE_CONFIG?.url && !window.SUPABASE_CONFIG.url.includes('YOUR')) {
    sb = createClient(window.SUPABASE_CONFIG.url, window.SUPABASE_CONFIG.key);
    return true;
  }
  try {
    const r = await fetch('/api/env');
    const e = await r.json();
    if (e.url && e.key) { sb = createClient(e.url, e.key); return true; }
  } catch(e) {}
  return false;
}

window.addEventListener('load', async () => {
  await initSupabase();

  // Teacher view mode: ?view=studentId
  const params = new URLSearchParams(location.search);
  const viewId = params.get('view');
  if (viewId) {
    const { data: stu } = await sb.from('students').select('*').eq('id', viewId).single();
    if (stu) {
      currentStudent = stu;
      // Show teacher-view badge
      document.getElementById('navRight').innerHTML += `
        <span style="background:rgba(245,158,11,.15);color:#fcd34d;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600">👁 O'qituvchi ko'rish rejimi</span>`;
      await loadCabinet();
      return;
    }
  }

  // Check saved session
  const saved = localStorage.getItem('student_session');
  if (saved) {
    try {
      currentStudent = JSON.parse(saved);
      await loadCabinet();
      return;
    } catch(e) { localStorage.removeItem('student_session'); }
  }
  document.getElementById('loginPage').style.display = 'flex';
});

// ============================================================
// LOGIN
// ============================================================
async function doStudentLogin() {
  const login = document.getElementById('loginInput').value.trim();
  const pass  = document.getElementById('passInput').value.trim();
  const errEl = document.getElementById('loginErr');
  const btn   = document.getElementById('loginBtn');
  errEl.style.display = 'none';
  if (!login || !pass) { showErr('Login va parolni kiriting'); return; }

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Kirilmoqda...';

  try {
    // Find student by phone or email + password
    // 1. Find auth record by phone + password
    const { data: authData } = await sb.from('student_auth')
      .select('student_id')
      .eq('phone', login)
      .eq('password', pass)
      .maybeSingle();

    let data = null;
    if (authData?.student_id) {
      const { data: stuData } = await sb.from('students')
        .select('*').eq('id', authData.student_id).maybeSingle();
      data = stuData;
    }
    const error = null;

    if (error || !data) {
      showErr('Login yoki parol noto\'g\'ri');
      btn.disabled = false;
      btn.innerHTML = 'Kirish →';
      return;
    }

    currentStudent = data_final || data;
    localStorage.setItem('student_session', JSON.stringify(data_final || data));
    await loadCabinet();
  } catch(e) {
    showErr('Xato yuz berdi: ' + e.message);
    btn.disabled = false;
    btn.innerHTML = 'Kirish →';
  }
}

function showErr(msg) {
  const el = document.getElementById('loginErr');
  el.textContent = msg;
  el.style.display = 'block';
}

function logout() {
  localStorage.removeItem('student_session');
  currentStudent = null;
  document.getElementById('cabinetPage').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('loginInput').value = '';
  document.getElementById('passInput').value = '';
}

// ============================================================
// CABINET
// ============================================================
async function loadCabinet() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('cabinetPage').style.display = 'block';

  // Update nav
  document.getElementById('navRight').innerHTML = `
    <span style="font-size:13px;color:var(--muted)">${currentStudent.last_name} ${currentStudent.first_name}</span>
    <button class="btn btn-secondary btn-sm" onclick="logout()">Chiqish</button>`;

  const s = currentStudent;
  const initials = (s.last_name?.[0]||'') + (s.first_name?.[0]||'');

  // Load groups
  const { data: sgLinks } = await sb.from('student_groups').select('group_id').eq('student_id', s.id);
  const gids = (sgLinks||[]).map(x => x.group_id);
  let groups = [];
  if (gids.length) {
    const { data: grpData } = await sb.from('groups').select('*').in('id', gids);
    groups = grpData || [];
  }

  // Profile header
  document.getElementById('profileHeader').innerHTML = `
    <div class="avatar">${initials||'O'}</div>
    <div style="flex:1">
      <div style="font-size:22px;font-weight:800">${s.last_name} ${s.first_name}</div>
      <div style="font-size:13px;color:var(--muted);margin-top:4px">${s.phone||''}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">
        ${groups.map(g=>`<span style="font-size:12px;background:rgba(124,111,247,.15);color:#c4b5fd;border-radius:20px;padding:3px 12px;border:1px solid rgba(124,111,247,.2)">${g.name}</span>`).join('')||'<span style="color:var(--hint);font-size:12px">Guruhga biriktirilmagan</span>'}
      </div>
    </div>
    <div style="text-align:center">
      <div id="totalCoinDisplay" style="font-size:32px;font-weight:900;color:var(--gold)">...</div>
      <div style="font-size:12px;color:var(--muted)">Jami coin</div>
    </div>`;

  // Load everything in parallel
  const [coinsRes, resultsRes, journalRes] = await Promise.all([
    sb.from('student_coins').select('*').eq('student_id', s.id).order('awarded_at', {ascending:false}),
    sb.from('quiz_results').select('*').eq('student_id', s.id).order('taken_at', {ascending:false}),
    gids.length ? sb.from('journal_entries').select('*').eq('student_id', s.id).in('group_id', gids).order('lesson_date', {ascending:false}) : {data:[]}
  ]);

  const coins   = coinsRes.data || [];
  const results = resultsRes.data || [];
  const journal = journalRes.data || [];

  const totalCoins = coins.reduce((s,r) => s+r.amount, 0);
  document.getElementById('totalCoinDisplay').innerHTML = coinIcon(20) + totalCoins;

  // Stats
  const testAvg = results.length ? Math.round(results.reduce((a,r)=>a+r.percent,0)/results.length) : null;
  const journalTotal = journal.reduce((s,e)=>{
    let t=0; Object.values(e.grades||{}).forEach(v=>t+=parseFloat(v)||0); return s+t;
  }, 0);

  document.getElementById('statGrid').innerHTML = `
    <div class="stat-card">
      <div class="stat-val" style="color:var(--blue)">${results.length}</div>
      <div class="stat-lbl">📝 Test topshirgan</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color:${testAvg>=70?'var(--green)':testAvg>=50?'var(--amber)':'var(--red)'}">${testAvg!==null?testAvg+'%':'—'}</div>
      <div class="stat-lbl">Test o'rtachasi</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color:var(--amber)">${journal.length}</div>
      <div class="stat-lbl">📋 Dars yozuvi</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color:var(--gold)">${coinIcon(22)}${totalCoins}</div>
      <div class="stat-lbl">Jami coin</div>
    </div>`;

  // Render default tab
  renderResults(results);
  renderJournal(journal, gids);
  renderCoins(coins);
  renderRanking(s.id, gids);
}

// ============================================================
// COIN SVG
// ============================================================
function coinIcon(size=14) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="#fcd34d" style="display:inline-block;vertical-align:middle;margin-right:2px"><circle cx="12" cy="12" r="10"/><text x="12" y="16" text-anchor="middle" font-size="11" font-weight="bold" fill="#78350f">C</text></svg>`;
}

// ============================================================
// TABS
// ============================================================
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    const names = ['results','journal','coins','ranking'];
    t.classList.toggle('active', names[i]===name);
  });
  ['results','journal','coins','ranking'].forEach(n => {
    document.getElementById('tab-'+n).style.display = n===name?'':'none';
  });
}

// ============================================================
// TEST NATIJALARI
// ============================================================
async function renderResults(results) {
  const wrap = document.getElementById('tab-results');
  if (!results.length) {
    wrap.innerHTML = '<div class="card" style="text-align:center;color:var(--muted);padding:40px">Hali test topshirmadingiz</div>';
    return;
  }

  // Load test names
  const testIds = [...new Set(results.map(r=>r.test_id))];
  const { data: tests } = await sb.from('tests').select('id,name').in('id', testIds);
  const testMap = {};
  (tests||[]).forEach(t => testMap[t.id]=t.name);

  const coinMap = {};
  try {
    const { data: testCoins } = await sb.from('student_coins')
      .select('source_id,amount').eq('student_id', currentStudent.id).eq('source', 'test');
    (testCoins||[]).forEach(r => {
      // source_id = 'test_<testId>_<stuId>' or 'written_<waId>'
      coinMap[r.source_id] = (coinMap[r.source_id]||0) + r.amount;
    });
  } catch(e) {}

  wrap.innerHTML = `<div class="card" style="padding:0;overflow:hidden">
    <table>
      <thead><tr>
        <th>#</th><th>Test nomi</th><th style="text-align:center">Ball</th>
        <th style="text-align:center">Natija</th><th style="text-align:center">Coin</th><th>Sana</th>
      </tr></thead>
      <tbody>
        ${results.map((r,i) => {
          const pct = r.percent || 0;
          const color = pct>=85?'var(--green)':pct>=70?'var(--blue)':pct>=50?'var(--amber)':'var(--red)';
          const grade = pct>=85?"A'lo":pct>=70?'Yaxshi':pct>=50?'Qoniqarli':'Qoniqarsiz';
          const date = r.taken_at ? new Date(r.taken_at).toLocaleDateString('uz-UZ',{day:'numeric',month:'short',year:'numeric'}) : '—';
          return `<tr>
            <td style="color:var(--muted)">${i+1}</td>
            <td><strong>${testMap[r.test_id]||'Test'}</strong></td>
            <td style="text-align:center;font-weight:700">${r.score||0}/${r.total||0}</td>
            <td style="text-align:center">
              <span style="font-weight:800;font-size:15px;color:${color}">${pct}%</span>
              <span style="font-size:11px;color:var(--muted);display:block">${grade}</span>
            </td>
            <td style="text-align:center;color:var(--gold);font-weight:700">${coinIcon()}${coinMap['test_'+r.test_id+'_'+currentStudent.id]||0}</td>
            <td style="color:var(--muted);font-size:12px">${date}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`;
}

// ============================================================
// JURNAL
// ============================================================
async function renderJournal(journal, gids) {
  const wrap = document.getElementById('tab-journal');
  if (!journal.length) {
    wrap.innerHTML = '<div class="card" style="text-align:center;color:var(--muted);padding:40px">Jurnal yozuvlari yo\'q</div>';
    return;
  }

  // Load categories
  let cats = [];
  if (gids.length) {
    const { data } = await sb.from('grade_categories').select('*').in('group_id', gids);
    cats = data || [];
  }

  const attLabel = {present:'✅ Keldi', absent:'❌ Kelmadi', late:'🕐 Kech', excused:'📋 Sababli'};
  const attColor = {present:'var(--green)', absent:'var(--red)', late:'var(--amber)', excused:'var(--blue)'};

  wrap.innerHTML = `<div class="card" style="padding:0;overflow:hidden">
    <table>
      <thead><tr>
        <th>Sana</th>
        <th style="text-align:center">Davomat</th>
        ${cats.map(c=>`<th style="text-align:center">${c.name}<br><span style="font-size:10px;font-weight:400;color:var(--hint)">/${c.max_score}</span></th>`).join('')}
        <th style="text-align:center;color:var(--gold)">${coinIcon()}Coin</th>
      </tr></thead>
      <tbody>
        ${journal.map(e => {
          const att = e.attendance || 'present';
          let totalCoin = 0;
          cats.forEach(c => {
            const v = (e.grades||{})[c.id];
            if (v !== undefined && v !== '') totalCoin += Math.round((parseFloat(v)||0) * (c.coin_multiplier||1));
          });
          return `<tr>
            <td style="font-weight:600">${new Date(e.lesson_date+'T00:00:00').toLocaleDateString('uz-UZ',{day:'numeric',month:'short'})}</td>
            <td style="text-align:center">
              <span style="color:${attColor[att]||'var(--muted)'};font-size:13px">${attLabel[att]||att}</span>
            </td>
            ${cats.map(c => {
              const v = (e.grades||{})[c.id];
              return `<td style="text-align:center;font-weight:700;color:var(--purple)">${v!==undefined&&v!==''?v:'—'}</td>`;
            }).join('')}
            <td style="text-align:center;color:var(--gold);font-weight:700">${coinIcon()}${totalCoin}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`;
}

// ============================================================
// COINLAR
// ============================================================
function renderCoins(coins) {
  const wrap = document.getElementById('tab-coins');
  if (!coins.length) {
    wrap.innerHTML = '<div class="card" style="text-align:center;color:var(--muted);padding:40px">Hali coin yo\'q. Test toping yoki darsda faol bo\'ling!</div>';
    return;
  }

  const total  = coins.reduce((s,r)=>s+r.amount,0);
  const testC  = coins.filter(r=>r.source==='test').reduce((s,r)=>s+r.amount,0);
  const jrnC   = coins.filter(r=>r.source==='journal').reduce((s,r)=>s+r.amount,0);

  // Monthly chart data
  const monthly = {};
  coins.forEach(r => {
    const m = r.awarded_at ? r.awarded_at.slice(0,7) : 'unknown';
    if (!monthly[m]) monthly[m] = 0;
    monthly[m] += r.amount;
  });
  const months = Object.keys(monthly).sort();
  const maxVal = Math.max(...Object.values(monthly), 1);

  wrap.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px">
      <div class="stat-card">
        <div class="stat-val" style="color:var(--gold)">${coinIcon(22)}${total}</div>
        <div class="stat-lbl">Jami coin</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:#93c5fd">${testC}</div>
        <div class="stat-lbl">📝 Testdan</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:#86efac">${jrnC}</div>
        <div class="stat-lbl">📋 Darsdan</div>
      </div>
    </div>

    ${months.length > 1 ? `
    <div class="card" style="margin-bottom:16px">
      <div style="font-size:13px;font-weight:600;margin-bottom:12px;color:var(--muted)">Oylar bo'yicha</div>
      <div style="display:flex;align-items:flex-end;gap:8px;height:80px">
        ${months.map(m => {
          const pct = Math.round(monthly[m]/maxVal*100);
          const label = m.slice(0,7);
          return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
            <div style="font-size:10px;color:var(--gold);font-weight:700">${monthly[m]}</div>
            <div style="width:100%;border-radius:4px 4px 0 0;background:rgba(252,211,77,.3);border:1px solid rgba(252,211,77,.4);height:${pct}%"></div>
            <div style="font-size:10px;color:var(--hint);white-space:nowrap">${label.slice(5)}</div>
          </div>`;
        }).join('')}
      </div>
    </div>` : ''}

    <div class="card" style="padding:0;overflow:hidden">
      <table>
        <thead><tr>
          <th>Manba</th><th>Izoh</th>
          <th style="text-align:center">${coinIcon()}Coin</th>
          <th>Sana</th>
        </tr></thead>
        <tbody>
          ${coins.map(r => `<tr>
            <td><span class="badge ${r.source==='test'?'badge-blue':'badge-green'}">${r.source==='test'?'📝 Test':'📋 Dars'}</span></td>
            <td style="color:var(--muted);font-size:12px">${r.description||'—'}</td>
            <td style="text-align:center;font-weight:700;color:var(--gold)">+${r.amount}</td>
            <td style="color:var(--hint);font-size:12px">${r.awarded_at?new Date(r.awarded_at).toLocaleDateString('uz-UZ',{day:'numeric',month:'short',year:'2-digit'}):'—'}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

// ============================================================
// REYTING
// ============================================================
async function renderRanking(stuId, gids) {
  const wrap = document.getElementById('tab-ranking');
  wrap.innerHTML = '<div style="color:var(--muted);padding:20px;text-align:center"><div class="spinner"></div></div>';

  try {
    if (!gids.length) {
      wrap.innerHTML = '<div class="card" style="text-align:center;color:var(--muted);padding:40px">Guruhga biriktirilmagan</div>';
      return;
    }

    // Get all students in same groups
    const { data: sgLinks } = await sb.from('student_groups').select('student_id').in('group_id', gids);
    const allStuIds = [...new Set((sgLinks||[]).map(x=>x.student_id))];

    // Get coins for all students in group
    const { data: allCoins } = await sb.from('student_coins').select('student_id,amount').in('student_id', allStuIds);
    const { data: stuNames } = await sb.from('students').select('id,first_name,last_name').in('id', allStuIds);

    const map = {};
    (allCoins||[]).forEach(r => {
      if (!map[r.student_id]) map[r.student_id] = 0;
      map[r.student_id] += r.amount||0;
    });
    // Include all students even with 0 coins
    allStuIds.forEach(id => { if (!map[id]) map[id]=0; });

    const ranked = Object.entries(map)
      .map(([id, coins]) => {
        const stu = (stuNames||[]).find(s=>s.id===id);
        return { id, coins, name: stu ? stu.last_name+' '+stu.first_name : '—', isMe: id===stuId };
      })
      .sort((a,b) => b.coins-a.coins);

    const myRank = ranked.findIndex(r=>r.isMe) + 1;
    const medals = ['🥇','🥈','🥉'];
    const coinColor = c => c>=500?'#fcd34d':c>=200?'#c4b5fd':c>=50?'#86efac':'var(--muted)';

    wrap.innerHTML = `
      ${myRank > 0 ? `<div style="background:rgba(124,111,247,.1);border:1px solid rgba(124,111,247,.3);border-radius:12px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:12px">
        <span style="font-size:28px">${medals[myRank-1]||myRank+'.'}</span>
        <div>
          <div style="font-weight:700">Sizning o'rningiz: <span style="color:var(--purple);font-size:18px">#${myRank}</span></div>
          <div style="font-size:12px;color:var(--muted)">${ranked.length} o'quvchi orasida</div>
        </div>
        <div style="margin-left:auto;font-size:20px;font-weight:900;color:var(--gold)">${coinIcon(18)}${ranked.find(r=>r.isMe)?.coins||0}</div>
      </div>` : ''}
      <div class="card">
        ${ranked.map((r,i) => `
          <div class="rank-row" style="${r.isMe?'background:rgba(124,111,247,.1);border:1px solid rgba(124,111,247,.2);border-radius:10px;':''} padding:10px 12px">
            <div class="rank-medal">${medals[i]||i+1+'.'}</div>
            <div style="flex:1;font-weight:${r.isMe?'700':'500'};color:${r.isMe?'var(--purple)':'var(--text)'}">${r.name}${r.isMe?' (siz)':''}</div>
            <div style="font-weight:800;color:${coinColor(r.coins)}">${coinIcon()}${r.coins}</div>
          </div>`).join('')}
      </div>`;
  } catch(e) {
    wrap.innerHTML = `<div class="card" style="color:var(--red);padding:20px">Yuklab bo'lmadi: ${e.message}</div>`;
  }
}

// ============================================================
// NOTIFY
// ============================================================
function notify(msg, type='success') {
  const wrap = document.getElementById('notifWrap');
  const el = document.createElement('div');
  el.className = 'notif'+(type==='err'?' err':'');
  el.innerHTML = `<span>${type==='err'?'❌':'✅'}</span> ${msg}`;
  wrap.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300);},3500);
}
</script>
